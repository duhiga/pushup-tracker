<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pushup Tracker</title>

  <!-- PWA / Fullscreen meta tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    html, body { height:100%; }
    body { margin:0; font-family: system-ui; background:#0f172a; color:white; overflow:hidden; overscroll-behavior-y:none; }
    .container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; height:100dvh; padding:16px; }

    .ring { position:relative; width:180px; height:180px; }
    svg { transform:rotate(-90deg); }
    .center-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
    .ring.goal-met { animation: goal-pop 800ms ease-out; }
    @keyframes goal-pop {
      0% { transform: translateZ(0) scale(1) rotate(0deg); }
      35% { transform: translateZ(0) scale(1.08) rotate(8deg); }
      65% { transform: translateZ(0) scale(0.98) rotate(-4deg); }
      100% { transform: translateZ(0) scale(1) rotate(0deg); }
    }

    .count { font-size:64px; font-weight:bold; margin-top:10px; }
    .goal { opacity:0.7; }

    .rest-box {
      margin-top:10px;
      padding:10px 16px;
      border-radius:12px;
      background:#1e293b;
      font-size:18px;
      font-weight:bold;
    }

    .buttons { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:320px; margin-top:10px; }
    button { padding:18px; font-size:18px; border:none; border-radius:14px; }

    .primary { background:#22c55e; color:black; }
    .danger { background:#ef4444; }
    .secondary { background:#334155; color:white; }

    .nav { margin-top:16px; display:grid; grid-template-columns:56px 1fr 56px; align-items:center; width:100%; max-width:320px; }
    .nav button { width:56px; }
    .nav-left { justify-self:start; }
    .nav-right { justify-self:end; }
    .topbar { position:absolute; top:12px; right:12px; }

    .settings { position:fixed; inset:0; background:#000000dd; display:flex; align-items:center; justify-content:center; padding:16px; }
    .settings-panel {
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      width:100%;
      max-width:360px;
      max-height:90vh;
      overflow-y:auto;
    }

    .settings-actions { position: sticky; bottom: -20px; display:flex; justify-content:flex-end; padding-top:12px; margin-top:8px; background: linear-gradient(180deg, rgba(30,41,59,0) 0%, #1e293b 40%); }

    input { width:100%; max-width:100%; box-sizing:border-box; padding:10px; margin-bottom:12px; font-size:16px; border-radius:8px; border:none; }
    label { font-size:14px; opacity:0.8; }

    .hint { font-size:12px; opacity:0.6; margin-bottom:10px; }

    /* No generic animations */

    /* Spin-and-morph center text */
    .center-text .pct, .center-text .rest { position:absolute; }
    .center-text.to-rest { animation: spinBack 600ms ease-in-out; }
    .center-text.to-rest .pct { animation: pctOut 600ms linear forwards; }
    .center-text.to-rest .rest { animation: restIn 600ms linear forwards; }
    .center-text.from-rest { animation: spinFwd 600ms ease-in-out; }
    .center-text.from-rest .rest { animation: restOut 600ms linear forwards; }
    .center-text.from-rest .pct { animation: pctIn 600ms linear forwards; }
    @keyframes spinBack { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes spinFwd { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pctOut { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes restIn { 0%,50% { opacity:0; } 51%,100% { opacity:1; } }
    @keyframes restOut { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
    @keyframes pctIn { 0%,50% { opacity:0; } 51%,100% { opacity:1; } }

    /* Date stack styles */
    .date-stack { display:flex; flex-direction:column; align-items:center; line-height:1.1; }
    .weekday { font-size:22px; font-weight:700; }
    .date-sub { font-size:12px; opacity:0.7; margin-top:2px; }

    /* IO row */
    .io-row { display:flex; gap:8px; flex-wrap:wrap; }
    .hidden-file { display:none; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="app.js"></script>

</body>
</html>
